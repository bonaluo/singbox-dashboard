name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend:latest

      - name: Update Docker Hub repository descriptions
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          DESCRIPTION=$(cat DOCKER_HUB.md | jq -Rs .)

          for REPO in singbox-dashboard-backend singbox-dashboard-frontend; do
            echo "Updating description for $REPO..."
            curl -sS -X PATCH \
              -H "Content-Type: application/json" \
              -u "${DOCKER_USERNAME}:${DOCKER_TOKEN}" \
              -d "{\"full_description\": ${DESCRIPTION}}" \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${REPO}/"
          done
