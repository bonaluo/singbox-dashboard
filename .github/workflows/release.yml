name: Build and Push Multi-arch Images

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── 矩阵构建：image × platform，共 4 个并行构建 ──────────
  build:
    name: ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:  [backend, frontend]
        platform: [linux/amd64, linux/arm64]
        exclude:
          # 暂不需要排除任何组合；两条镜像均为多架构基础镜像
          # 若后续有平台不兼容需求，在此添加:
          # - image: frontend
          #   platform: linux/arm64/v7
    env:
      # CI 走 Docker Hub 官方源，加速镜像请通过 DOCKER_HOST 代理
      GO_IMAGE:     golang:1.25-alpine
      NODE_IMAGE:   node:22-alpine
      NPM_REGISTRY: https://registry.npmjs.org
    outputs:
      platform_tag: ${{ steps.tag.outputs.platform_tag }}
      is_tag_event: ${{ steps.tag_event.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log host / target arch
        run: |
          echo "Host (runner): $(uname -m)"
          echo "Target:          ${{ matrix.image }} / ${{ matrix.platform }}"

      # 需要在 ARM64 runner 上构建 x86_64 镜像时必需
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with: { platforms: all }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with: { platforms: all }

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 修复：仅保留唯一版本计算步骤
      - name: Resolve version tag
        id: resolve_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
            echo "IS_TAG=1" >> "$GITHUB_ENV"
          else
            echo "VERSION=sha-${GITHUB_SHA::8}" >> "$GITHUB_ENV"
            echo "IS_TAG=0" >> "$GITHUB_ENV"
          fi

      - name: Compute push tag
        id: tag
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-${{ matrix.image }}"
          echo "platform_tag=${REPO}:${{ env.VERSION }}-${{ matrix.platform }}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_ENV"

      - name: Mark tag / non-tag event
        id: tag_event
        run: echo "is_tag=${{ env.IS_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.image }} (${{ matrix.platform }})
        uses: docker/build-push-action@v5
        with:
          context:       ./${{ matrix.image }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ${{ matrix.image == 'backend'      && format('GO_IMAGE={0}', env.GO_IMAGE)            || '' }}
            ${{ matrix.image == 'frontend'     && format('NODE_IMAGE={0}', env.NODE_IMAGE)          || '' }}
            ${{ matrix.image == 'frontend'     && format('NPM_REGISTRY={0}', env.NPM_REGISTRY)      || '' }}
          platforms:     ${{ matrix.platform }}
          push:          true
          tags:          ${{ steps.tag.outputs.platform_tag }}
          labels:        |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from:    type=gha
          cache-to:      type=gha,mode=max

  # ── 合并 manifest list（含 :latest） ─────────────────────
  manifest:
    name: Merge manifest list — ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "IS_TAG=1" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "IS_TAG=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest list (version tag)
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-${{ matrix.image }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Creating manifest: ${REPO}:${VERSION}"
          docker buildx imagetools create \
            --tag "${REPO}:${VERSION}" \
            "${REPO}:${VERSION}-linux/amd64" \
            "${REPO}:${VERSION}-linux/arm64"

      - name: Create manifest list (latest)
        if: steps.version.outputs.IS_TAG == '1'
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-${{ matrix.image }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Updating :latest → ${VERSION}"
          docker buildx imagetools create \
            --tag "${REPO}:latest" \
            "${REPO}:${VERSION}-linux/amd64" \
            "${REPO}:${VERSION}-linux/arm64"

  # ── 更新 Docker Hub 镜像描述 ──────────────────────────────
  update-descriptions:
    name: Update Docker Hub README
    needs: manifest
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.manifest.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Update backend README
        uses: peter-evans/dockerhub-description@v5
        with:
          username:       ${{ secrets.DOCKER_USERNAME }}
          password:       ${{ secrets.DOCKER_TOKEN }}
          repository:     ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend
          readme-filepath: ./DOCKER_HUB.md
          short-description: sing-box dashboard backend (Go API + sing-box core)

      - name: Update frontend README
        uses: peter-evans/dockerhub-description@v5
        with:
          username:       ${{ secrets.DOCKER_USERNAME }}
          password:       ${{ secrets.DOCKER_TOKEN }}
          repository:     ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend
          readme-filepath: ./DOCKER_HUB.md
          short-description: sing-box dashboard web frontend (Next.js)
