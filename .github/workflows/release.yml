name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend:latest

      - name: Update Docker Hub repository descriptions
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-backend
          readme-filepath: ./DOCKER_HUB.md

      - name: Update Docker Hub frontend description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ secrets.DOCKER_USERNAME }}/singbox-dashboard-frontend
          readme-filepath: ./DOCKER_HUB.md