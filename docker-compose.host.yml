# docker-compose.host.yml — host 网络模式叠加文件
#
# 用法: docker compose -f docker-compose.yml -f docker-compose.host.yml up -d
#
# 适用场景: Linux / WSL2（macOS/Windows Docker Desktop 不支持 host 网络）
#
# host 模式下容器共享宿主机网络栈:
#   - 容器端口直接暴露在宿主机上，无需端口映射
#   - docker-compose.yml 中的 ports 会被忽略（仅 warning）
#   - 通过 FRONTEND_PORT/BACKEND_PORT/... 环境变量控制监听端口

services:
  backend:
    network_mode: host

  frontend:
    network_mode: host
