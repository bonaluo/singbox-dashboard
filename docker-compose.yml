# singbox-dashboard — Docker Compose 部署文件（正式环境）
#
# 拉取云端镜像启动：
#   docker compose up -d
#
# 参数 (.env 或环境变量):
#   BACKEND_IMAGE     — 后端镜像 (默认 bonaluo/singbox-dashboard-backend)
#   FRONTEND_IMAGE    — 前端镜像 (默认 bonaluo/singbox-dashboard-frontend)
#   TAG               — 镜像标签 (默认 latest)
#   DATA_DIR          — 数据挂载目录 (默认 ./data)
#   FRONTEND_PORT     — 前端端口 (默认 9000)
#   BACKEND_PORT      — 后端端口 (默认 9092)
#   SINGBOX_MIXED_PORT — 代理端口 (默认 2080)
#   SINGBOX_CLASH_PORT — Clash API 端口 (默认 9090)

services:
  backend:
    image: ${BACKEND_IMAGE:-bonaluo/singbox-dashboard-backend}:${TAG:-latest}
    container_name: singbox-backend
    network_mode: bridge
    volumes:
      - ${DATA_DIR:-./data}:/data
    ports:
      - "${BACKEND_PORT:-9092}:9092"
      - "${SINGBOX_MIXED_PORT:-2080}:2080"
      - "${SINGBOX_CLASH_PORT:-9090}:9090"
    environment:
      - TZ=Asia/Shanghai
      - SINGBOX_CONFIG=/data/sing-box-config.json
      - CLASH_API=http://127.0.0.1:9090
      - DASHBOARD_DATA_DIR=/data
      - LISTEN_ADDR=0.0.0.0:${BACKEND_PORT:-9092}
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-bonaluo/singbox-dashboard-frontend}:${TAG:-latest}
    container_name: singbox-frontend
    network_mode: bridge
    ports:
      - "${FRONTEND_PORT:-9000}:9000"
    environment:
      - HOST=0.0.0.0
      - PORT=${FRONTEND_PORT:-9000}
    restart: unless-stopped
    depends_on:
      - backend
