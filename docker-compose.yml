services:
  backend:
    build:
      context: ./backend
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GO_IMAGE: ${GO_IMAGE:-golang:1.25-alpine}
    image: singbox-backend:${TAG:-local}
    container_name: singbox-backend
    network_mode: host
    volumes:
      - /mnt/g/docker/singbox-dashboard/data:/data
    environment:
      - SINGBOX_CONFIG=/data/sing-box-config.json
      - CLASH_API=http://127.0.0.1:9090
      - DASHBOARD_DATA_DIR=/data
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    image: singbox-frontend:${TAG:-local}
    container_name: singbox-frontend
    network_mode: host
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=9000
      - NEXT_PUBLIC_GIT_COMMIT=${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      - backend
