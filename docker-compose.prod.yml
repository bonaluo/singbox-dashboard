# 生产部署 compose 文件 — 直接拉取预构建镜像，无需本地编译
#
# 启动: docker compose -f docker-compose.prod.yml up -d
#
services:
  backend:
    image: bonaluo/singbox-dashboard-backend:latest
    container_name: singbox-backend
    network_mode: host
    volumes:
      - /mnt/g/docker/singbox-dashboard/data:/data
    environment:
      - SINGBOX_CONFIG=/data/sing-box-config.json
      - CLASH_API=http://127.0.0.1:9090
      - DASHBOARD_DATA_DIR=/data
    restart: unless-stopped

  frontend:
    image: bonaluo/singbox-dashboard-frontend:latest
    container_name: singbox-frontend
    network_mode: host
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=9000
    restart: unless-stopped
    depends_on:
      - backend
